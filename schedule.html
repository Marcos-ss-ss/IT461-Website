<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="stylesheet.css">
  <title>Schedule Service</title>
</head>
<body>
<div class="wizard-container">
  <h1>Schedule Laundry Service</h1>
  <form id="laundryForm">

    <!-- STEP 1: Add Items -->
    <div class="step active">
      <h3>Select Your Items</h3>

      <label>Service Type</label>
      <select id="clothingType">
        <option value="">Select type</option>
      </select>

      <br><br>
      <label>Quantity</label>
      <input type="number" id="quantity" min="1" placeholder="Enter quantity">

      <p id="pricePreview"></p>
      <br>
      <button type="button" id="addItem">Add Item</button>

      <h3>Items Added:</h3>
      <ul id="itemList"></ul>

      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- STEP 2: Pickup Details -->
    <div class="step">
      <label>Preferred Pickup Date</label>
      <input type="date" id="pickupDate">

      <br><br>
      <label>Preferred Pickup Time</label>
      <input type="time" id="pickupTime">

      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- STEP 3: Special Instructions -->
    <div class="step">
      <label>Any special instructions?</label>
      <textarea id="instructions" placeholder="Optional"></textarea>

      <button type="submit" class="submit-btn">Submit Order</button>
    </div>

  </form>

  <div id="receipt" class="receipt" style="display:none;"></div>
</div>

<script src="schedule.js"></script>
</body>
</html>
