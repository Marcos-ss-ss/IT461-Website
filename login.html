<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="login.css">
<title>Login</title>
<style>
  .login-logo { width: 184px !important; max-width: 184px !important; }
</style>
</head>
<body>
<div class="wizard-container">
  <img src="WDS-Logo.png" class="login-logo">
  <h2>Login</h2>
  <form id="loginForm">
    <label>Phone Number or Email</label>
    <input type="text" id="loginInput" required>
    <label>Password</label>
    <input type="password" id="password" required>
    <button type="submit" class="next-btn">Login</button>
    <a class="back-link" href="index.html">← Back to main site</a>
  </form>
  <p>Don't have an account?</p>
  <a href="./createAccount.html">Create Account</a>
  <p id="loginMessage"></p>
</div>
<script src="login.js"></script>
</body>
</html>
